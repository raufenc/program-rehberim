<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d9488">
  <meta name="description" content="Turkiye Yuzyili Maarif Modeli Ogretmen Asistani - Haftalik plan, ogretim programi ve ders kitabi rehberi">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Program Rehberim</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['class', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#0d9488', dark: '#0f766e', light: '#14b8a6', 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4' },
            accent: { DEFAULT: '#f97316', dark: '#ea580c', light: '#fb923c' },
            surface: { DEFAULT: '#f8fafc', dark: '#1e293b' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans min-h-screen">
  <!-- Header -->
  <header id="app-header" class="sticky top-0 z-40 bg-primary dark:bg-slate-800 text-white shadow-md">
    <div class="max-w-5xl mx-auto flex items-center h-14 px-4">
      <button id="btn-back" onclick="window.history.back()" class="mr-3 p-1 rounded-lg hover:bg-white/20 transition hidden">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <h1 id="header-title" class="text-lg font-semibold truncate flex-1 cursor-pointer" onclick="location.hash='#/'">Program Rehberim</h1>
      <button id="btn-settings" onclick="location.hash='#/ayarlar'" class="p-2 rounded-lg hover:bg-white/20 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app" class="max-w-5xl mx-auto px-4 py-4 pb-24">
    <div class="flex items-center justify-center h-64">
      <div class="animate-pulse flex flex-col items-center gap-3">
        <div class="w-12 h-12 rounded-full bg-primary/20"></div>
        <p class="text-slate-400">Yukleniyor...</p>
      </div>
    </div>
  </main>

  <!-- Teknik Modal -->
  <div id="teknik-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeTeknikModal()"></div>
    <div class="absolute bottom-0 left-0 right-0 max-h-[85vh] bg-white dark:bg-slate-800 rounded-t-2xl shadow-2xl overflow-y-auto animate-slide-up">
      <div class="sticky top-0 bg-white dark:bg-slate-800 border-b dark:border-slate-700 px-4 py-3 flex items-center justify-between">
        <h3 id="teknik-modal-title" class="font-semibold text-lg"></h3>
        <button onclick="closeTeknikModal()" class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="teknik-modal-body" class="p-4"></div>
    </div>
  </div>

  <!-- Kavram Modal -->
  <div id="kavram-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeKavramModal()"></div>
    <div class="absolute bottom-0 left-0 right-0 max-h-[70vh] bg-white dark:bg-slate-800 rounded-t-2xl shadow-2xl overflow-y-auto animate-slide-up">
      <div class="sticky top-0 bg-white dark:bg-slate-800 border-b dark:border-slate-700 px-4 py-3 flex items-center justify-between">
        <h3 id="kavram-modal-title" class="font-semibold text-lg"></h3>
        <button onclick="closeKavramModal()" class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="kavram-modal-body" class="p-4"></div>
    </div>
  </div>

  <!-- Yetkinlik Modal -->
  <div id="yetkinlik-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeYetkinlikModal()"></div>
    <div class="absolute bottom-0 left-0 right-0 max-h-[85vh] bg-white dark:bg-slate-800 rounded-t-2xl shadow-2xl overflow-y-auto animate-slide-up">
      <div class="sticky top-0 bg-white dark:bg-slate-800 border-b dark:border-slate-700 px-4 py-3 flex items-center justify-between">
        <h3 id="yetkinlik-modal-title" class="font-semibold text-lg"></h3>
        <button onclick="closeYetkinlikModal()" class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="yetkinlik-modal-body" class="p-4"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800 px-4 py-2 rounded-lg shadow-lg text-sm transition-all duration-300 opacity-0 pointer-events-none z-50"></div>

  <script src="js/hafta.js"></script>
  <script src="js/yetkinlikler.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/pdf-viewer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
